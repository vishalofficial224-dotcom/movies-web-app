<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Movie Pirates Logo</title>
<style>
  body {
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
</style>
</head>
<body>

<svg width="500" height="200" viewBox="0 0 500 200">
  
  <!-- Background glow -->
  <defs>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B0000"/>
      <stop offset="50%" stop-color="#E50914"/>
      <stop offset="100%" stop-color="#8B0000"/>
    </linearGradient>
  </defs>

  <!-- Big M (Netflix-style) -->
  <path d="M50 150 L50 50 L90 50 L140 130 L190 50 L230 50 L230 150 L190 150 L190 90 L140 150 L90 90 L90 150 Z"
        fill="url(#redGradient)" />

  <!-- Text: MOVIE PIRATES -->
  <text x="260" y="110" fill="white" font-size="40" font-family="Arial Black, sans-serif" letter-spacing="2">
    PIRATES
  </text>

  <text x="260" y="70" fill="#E50914" font-size="20" font-family="Arial, sans-serif" letter-spacing="4">
    MOVIE
  </text>

</svg>

</body>
</html>
